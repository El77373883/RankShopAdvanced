# ============================================
# RankShopAdvanced Configuración
# ============================================

# Configuración del panel web
panel:
  # URL de tu dashboard (cambia por la tuya)
  url: "https://el77373883.github.io/Dashboard-RankShopAdvanced/"
  # API para registrar tokens
  api: "https://el77373883.github.io/Dashboard-RankShopAdvanced/api/register"

# Configuración de pagos
payments:
  # Email de PayPal para recibir pagos
  paypal_email: "tucorreo@ejemplo.com"
  # Moneda: USD, EUR, MXN, COP, ARS
  currency: "USD"

# Rangos por defecto (se cargan la primera vez)
default_ranks:
  - name: "VIP"
    price: 9.99
    duration: "30 días"
    icon: "👑"
    benefits: "Vuelo en zonas seguras, /workbench, Tag [VIP]"
    commands: "give {player} diamond 5"
    color: "&a"
  - name: "VIP+"
    price: 19.99
    duration: "30 días"
    icon: "🪙"
    benefits: "Todo VIP + /feed, /heal, Tag [VIP+] dorado"
    commands: "give {player} gold 10"
    color: "&6"
  - name: "MVP"
    price: 34.99
    duration: "Permanente"
    icon: "⭐"
    benefits: "Todo VIP+ + Doble XP, Partículas exclusivas"
    commands: "give {player} emerald 5"
    color: "&b"
  - name: "LEYENDA"
    price: 49.99
    duration: "Permanente"
    icon: "🔥"
    benefits: "Todo MVP + Área privada, Comandos exclusivos"
    commands: "give {player} netherite 2"
    color: "&4"

# Mensajes del plugin
messages:
  prefix: "&6[RankShop] &r"
  rank_given: "&a¡Has recibido el rango {rank}!"
  rank_removed: "&cTe han quitado el rango {rank}"
  no_permission: "&cNo tienes permiso para usar este comando"
  shop_opened: "&a¡Tienda abierta!"
  token_generated: "&aToken generado correctamente"
  token_expired: "&cEl token ha expirado"
  player_not_found: "&cJugador no encontrado"
  rank_not_found: "&cRango no encontrado"
  invalid_usage: "&cUso incorrecto: {usage}"
  reloaded: "&aConfiguración recargada"

# Configuración de la GUI
gui:
  title: "&6🏪 Tienda de Rangos"
  size: 54
  filler_material: "GRAY_STAINED_GLASS_PANE"
  filler_name: " "

# Configuración del servidor web (para API)
web:
  port: 8080
  enabled: true
